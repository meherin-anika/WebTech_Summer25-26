<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Registration Form</title>
</head>

<body>

<h1>User Registration Form</h1>

<form>

<table>

<tr>
<td><label>Full Name</label></td>
<td><input type="text" placeholder="Enter your full name"></td>
</tr>

<tr>
<td><label>Email Address</label></td>
<td><input type="email" placeholder="Enter your email"></td>
</tr>

<tr>
<td><label>Phone Number</label></td>
<td><input type="text" placeholder="Enter your phone number"></td>
</tr>

<tr>
<td><label>Gender</label></td>
<td>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
</td>
</tr>

<tr>
<td><label>Date of Birth</label></td>
<td><input type="date"></td>
</tr>

<tr>
<td><label>Address</label></td>
<td>
<textarea rows="4" cols="30" placeholder="Enter your address"></textarea>
</td>
</tr>

<tr>
<td><label>Password</label></td>
<td><input type="password" placeholder="Create a password"></td>
</tr>

<tr>
<td><label>Confirm Password</label></td>
<td><input type="password" placeholder="Confirm your password"></td>
</tr>

<tr>
<td><label>Upload Photo</label></td>
<td><input type="file"></td>
</tr>

<tr>
<td colspan="2" align="center">
<input type="submit" value="Register">
<input type="reset" value="Reset">
</td>
</tr>

</table>

</form>

<p align="center">
Your information is safe with us.
</p>

</body>
</html>
