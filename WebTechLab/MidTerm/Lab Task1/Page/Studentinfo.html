<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information Form</title>
    <link rel="stylesheet" href="../Design/design.css">
</head>
<body>

    <form class="form-container">
        <div class="form-badge">Student Information</div>

        <div class="form-row">
            <div>
                <label for="fullname">Full Name (Text)</label>
                <input type="text" id="fullname" placeholder="Enter your full name">
            </div>
            <div>
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="your.email@example.com">
            </div>
        </div>

        <div class="form-row">
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter secure password">
            </div>
            <div>
                <label for="age">Age (Number)</label>
                <input type="number" id="age" placeholder="Enter your age">
            </div>
        </div>

        <div class="form-row">
            <div>
                <label for="date">Experiment Date</label>
                <input type="date" id="date">
            </div>
            <div>
                <label for="phone">Phone Number (Tel)</label>
                <input type="tel" id="phone" placeholder="+880 XXXX XXXXXX">
            </div>
        </div>
    </form>

    <div class="button-container">
        <button type="submit" class="btn btn-submit">SUBMIT</button>
        <button type="reset" class="btn btn-clear">CLEAR</button>
    </div>

</body>
</html>
